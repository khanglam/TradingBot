name: Sync branches

# Daily merge dev → main for paper trading.
# Schedule: 14:00 UTC daily = 06:00 PST (07:00 PDT during daylight saving).

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-branches
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Merge dev and push
        run: |
          git config user.name 'autoresearch-bot'
          git config user.email 'autoresearch-bot@users.noreply.github.com'
          git fetch origin dev
          git merge origin/dev --no-edit -m "merge dev into main"
          git push origin main
