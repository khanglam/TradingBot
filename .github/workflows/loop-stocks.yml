name: Autoresearch loop (stocks)

# Runs the autoresearch loop on dev (single writer = this workflow).
# Main is NEVER touched — promotion to main happens via sync_branches.yml.
#
# Schedule: 11:00 UTC daily = 03:00 PST (04:00 PDT during daylight saving).
# Avoid running locally at the same time to prevent push races on dev.
#
# Required repo secrets:
#   OPENROUTER_API_KEY  — used by loop.py to call the LLM
# Optional repo variables:
#   OPENROUTER_MODEL    — any model slug from https://openrouter.ai/models

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      iters:
        description: 'Number of mutations to attempt'
        required: false
        default: '10'
        type: string
      optimize_metric:
        description: 'val_sharpe | calmar | dsr'
        required: false
        default: 'val_sharpe'
        type: choice
        options:
          - val_sharpe
          - calmar
          - dsr

permissions:
  contents: write

concurrency:
  group: loop-stocks-dev
  cancel-in-progress: false

jobs:
  loop:
    uses: ./.github/workflows/loop-dev.yml
    secrets: inherit
    with:
      campaign: stocks
      iters: ${{ github.event.inputs.iters || '10' }}
      optimize_metric: ${{ github.event.inputs.optimize_metric || 'val_sharpe' }}
