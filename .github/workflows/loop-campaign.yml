# Reusable autoresearch loop job. Called by loop-stocks.yml and loop-crypto.yml.
# Main is NEVER touched — promotion happens via sync_branches.yml.

name: Autoresearch loop (campaign)

on:
  workflow_call:
    inputs:
      campaign:
        description: 'stocks or crypto'
        required: true
        type: string
      iters:
        description: 'Number of mutations to attempt'
        required: false
        default: '8'
        type: string
      optimize_metric:
        description: 'val_sharpe | calmar | dsr'
        required: false
        default: 'val_sharpe'
        type: string

permissions:
  contents: write

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CAMPAIGN: ${{ inputs.campaign }}
      BRANCH: autoresearch/${{ inputs.campaign }}
      ITERS: ${{ inputs.iters }}
      OPTIMIZE_METRIC: ${{ inputs.optimize_metric }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-haiku-4-5' }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
      - name: Checkout campaign branch (full history for resets)
        uses: actions/checkout@v4
        with:
          ref: autoresearch/${{ inputs.campaign }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export campaign config to environment
        env:
          CAMPAIGN: ${{ inputs.campaign }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          from campaigns import CAMPAIGNS
          campaign = os.environ["CAMPAIGN"]
          if campaign not in CAMPAIGNS:
              sys.exit(f"CAMPAIGN={campaign!r} not in campaigns.py")
          with open(os.environ["GITHUB_ENV"], "a") as gh_env:
              gh_env.write(f"CAMPAIGN={campaign}\n")
              for key, val in CAMPAIGNS[campaign].items():
                  gh_env.write(f"{key.upper()}={val}\n")
          print(f"Exported {len(CAMPAIGNS[campaign])} vars for campaign={campaign!r}")
          EOF

      - name: Cache OHLCV parquet data
        uses: actions/cache@v4
        with:
          path: data/
          key: ohlcv-${{ runner.os }}-${{ inputs.campaign }}-v1
          restore-keys: |
            ohlcv-${{ runner.os }}-${{ inputs.campaign }}-
            ohlcv-${{ runner.os }}-

      - name: Fetch OHLCV data for each entry in SYMBOLS
        run: |
          # Each entry is "{asset}/{NAME}_{tf}" — e.g. crypto/BTC_USDT_4h, stocks/TSLA_1d.
          echo "$SYMBOLS" | tr ',' '\n' | while read -r entry; do
            entry=$(echo "$entry" | xargs)
            [ -z "$entry" ] && continue
            parquet="data/${entry}.parquet"
            if [ -f "$parquet" ]; then
              echo "have $parquet, skipping"
              continue
            fi
            asset="${entry%%/*}"
            rest="${entry#*/}"
            tf="${rest##*_}"
            name="${rest%_*}"
            if [ "$asset" = "crypto" ]; then
              name="${name//_//}"
              start="2019-01-01"
            else
              start="2015-01-01"
            fi
            mkdir -p "data/${asset}"
            echo "fetch: asset=$asset symbol=$name tf=$tf start=$start"
            python data_fetch.py --asset "$asset" --symbol "$name" --timeframe "$tf" --start "$start"
          done

      - name: Configure git for commits the loop makes
        run: |
          git config user.name 'autoresearch-bot'
          git config user.email 'autoresearch-bot@users.noreply.github.com'

      - name: Sanity check secret
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error ::OPENROUTER_API_KEY secret is not set on this repo"
            exit 1
          fi

      - name: Run autoresearch loop
        run: python loop.py --iters "$ITERS"

      - name: Push back to campaign branch
        env:
          BRANCH: autoresearch/${{ inputs.campaign }}
        run: |
          # Single-writer branch — no rebase needed. If push fails it means
          # someone pushed to this branch manually; surface that as an error
          # rather than silently rebasing over their work.
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/$BRANCH")" ]; then
            echo "No new commits from loop; nothing to push"
            exit 0
          fi
          git push origin "HEAD:$BRANCH"

      - name: Upload run.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ inputs.campaign }}-${{ github.run_id }}
          path: |
            results/run.log
            results/*.tsv
          retention-days: 30
