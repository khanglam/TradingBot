name: Autoresearch loop (crypto)

# Runs the autoresearch loop on dev. Main is updated by sync_branches.yml (06:00 PDT).
# Disable in GitHub: Actions → this workflow → ⋯ → Disable workflow.
#
# Schedule: 03:00 America/Los_Angeles daily (California local time).

on:
  schedule:
    - cron: '0 3 * * *'
      timezone: America/Los_Angeles
  workflow_dispatch:
    inputs:
      iters:
        description: 'Number of mutations to attempt'
        required: false
        default: '10'
        type: string
      optimize_metric:
        description: 'val_sharpe | calmar | dsr'
        required: false
        default: 'val_sharpe'
        type: choice
        options:
          - val_sharpe
          - calmar
          - dsr

permissions:
  contents: write

concurrency:
  group: loop-crypto-dev
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CAMPAIGN: crypto
      ITERS: ${{ github.event.inputs.iters || '10' }}
      OPTIMIZE_METRIC: ${{ github.event.inputs.optimize_metric || 'val_sharpe' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-haiku-4-5' }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
      - name: Checkout dev (full history for resets)
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export campaign config to environment
        env:
          CAMPAIGN: crypto
        run: |
          python - <<'EOF'
          import os, sys, tomllib
          campaign = os.environ["CAMPAIGN"]
          with open("configs.toml", "rb") as f:
              all_campaigns = tomllib.load(f)
          if campaign not in all_campaigns:
              sys.exit(f"CAMPAIGN={campaign!r} not in configs.toml")
          with open(os.environ["GITHUB_ENV"], "a") as gh_env:
              gh_env.write(f"CAMPAIGN={campaign}\n")
              for key, val in all_campaigns[campaign].items():
                  gh_env.write(f"{key.upper()}={val}\n")
          print(f"Exported {len(all_campaigns[campaign])} vars for campaign={campaign!r}")
          EOF

      - name: Cache OHLCV parquet data
        uses: actions/cache@v4
        with:
          path: data/
          key: ohlcv-${{ runner.os }}-crypto-v1
          restore-keys: |
            ohlcv-${{ runner.os }}-crypto-
            ohlcv-${{ runner.os }}-

      - name: Fetch OHLCV data for each entry in SYMBOLS
        run: |
          echo "$SYMBOLS" | tr ',' '\n' | while read -r entry; do
            entry=$(echo "$entry" | xargs)
            [ -z "$entry" ] && continue
            parquet="data/${entry}.parquet"
            if [ -f "$parquet" ]; then
              echo "have $parquet, skipping"
              continue
            fi
            asset="${entry%%/*}"
            rest="${entry#*/}"
            tf="${rest##*_}"
            name="${rest%_*}"
            if [ "$asset" = "crypto" ]; then
              name="${name//_//}"
              start="2019-01-01"
            else
              start="2015-01-01"
            fi
            mkdir -p "data/${asset}"
            echo "fetch: asset=$asset symbol=$name tf=$tf start=$start"
            python data_fetch.py --asset "$asset" --symbol "$name" --timeframe "$tf" --start "$start"
          done

      - name: Configure git for commits the loop makes
        run: |
          git config user.name 'autoresearch-bot'
          git config user.email 'autoresearch-bot@users.noreply.github.com'

      - name: Sanity check secret
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error ::OPENROUTER_API_KEY secret is not set on this repo"
            exit 1
          fi

      - name: Run autoresearch loop
        run: python loop.py --iters "$ITERS"

      - name: Push back to dev
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/dev)" ]; then
            echo "No new commits from loop; nothing to push"
            exit 0
          fi
          git push origin HEAD:dev

      - name: Upload run.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-crypto-${{ github.run_id }}
          path: |
            results/run.log
            results/*.tsv
          retention-days: 30
