name: Autoresearch loop

# Runs the autoresearch loop on dedicated campaign branches:
#   - stocks â†’ autoresearch/stocks  (one writer = this workflow)
#   - crypto â†’ autoresearch/crypto  (one writer = this workflow)
#
# Main is NEVER touched here â€” promotion to main happens via promote.yml.
# That isolation means each branch has exactly one writer, so there are no
# push races and no rebase-retry dance.
#
# Schedules (UTC):
#   - stocks: 04:00 daily        (= 21:00 PST previous day, well outside US
#                                  market hours so paper executor never sees
#                                  a strategy file mid-mutation)
#   - crypto: every 6h           (24/7 markets; paper crypto reads main, so
#                                  no contention with this branch)
#
# Required repo secrets:
#   OPENROUTER_API_KEY  â€” used by loop.py to call the LLM
# Optional repo variables:
#   OPENROUTER_MODEL    â€” any model slug from https://openrouter.ai/models

on:
  schedule:
    - cron: '0 4 * * *'      # stocks: 04:00 UTC daily
    - cron: '0 */6 * * *'    # crypto: every 6h
  workflow_dispatch:
    inputs:
      campaign:
        description: 'Which campaign to run'
        required: true
        default: 'stocks'
        type: choice
        options:
          - stocks
          - crypto
      iters:
        description: 'Number of mutations to attempt'
        required: false
        default: '8'
        type: string
      optimize_metric:
        description: 'val_sharpe | calmar | dsr'
        required: false
        default: 'val_sharpe'
        type: choice
        options:
          - val_sharpe
          - calmar
          - dsr

permissions:
  contents: write   # push commits the loop produces (campaign branch only)

jobs:
  # Single job, parameterized by campaign. The campaign is decided from the
  # cron string (or the dispatch input). Wrong-campaign-for-this-cron fires
  # are filtered out in the gate step rather than at the cron level so we
  # keep one job definition.
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Per-branch concurrency. A second tick for the same campaign queues
    # behind the first; different campaigns run in parallel.
    concurrency:
      group: autoresearch-loop-${{ github.event.schedule || github.event.inputs.campaign }}
      cancel-in-progress: false

    env:
      ITERS: ${{ github.event.inputs.iters || '8' }}
      OPTIMIZE_METRIC: ${{ github.event.inputs.optimize_metric || 'val_sharpe' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-haiku-4-5' }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
      - name: Decide campaign + branch from trigger
        id: route
        env:
          DISPATCH_CAMPAIGN: ${{ github.event.inputs.campaign }}
          TRIGGER_CRON: ${{ github.event.schedule }}
        run: |
          if [ -n "$DISPATCH_CAMPAIGN" ]; then
            CAMPAIGN="$DISPATCH_CAMPAIGN"
          elif [ "$TRIGGER_CRON" = "0 4 * * *" ]; then
            CAMPAIGN="stocks"
          elif [ "$TRIGGER_CRON" = "0 */6 * * *" ]; then
            CAMPAIGN="crypto"
          else
            echo "::error ::Unrecognized trigger; refusing to guess a campaign."
            exit 1
          fi
          BRANCH="autoresearch/$CAMPAIGN"
          echo "campaign=$CAMPAIGN" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"     >> "$GITHUB_OUTPUT"
          echo "Routed to campaign='$CAMPAIGN' branch='$BRANCH'"

      - name: Checkout campaign branch (full history for resets)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.route.outputs.branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install backtesting ccxt yfinance openai pyarrow scipy python-dotenv

      - name: Export campaign config to environment
        env:
          CAMPAIGN: ${{ steps.route.outputs.campaign }}
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          from campaigns import CAMPAIGNS
          campaign = os.environ["CAMPAIGN"]
          if campaign not in CAMPAIGNS:
              sys.exit(f"CAMPAIGN={campaign!r} not in campaigns.py")
          with open(os.environ["GITHUB_ENV"], "a") as gh_env:
              gh_env.write(f"CAMPAIGN={campaign}\n")
              for key, val in CAMPAIGNS[campaign].items():
                  gh_env.write(f"{key.upper()}={val}\n")
          print(f"Exported {len(CAMPAIGNS[campaign])} vars for campaign={campaign!r}")
          EOF

      - name: Cache OHLCV parquet data
        uses: actions/cache@v4
        with:
          path: data/
          key: ohlcv-${{ runner.os }}-${{ steps.route.outputs.campaign }}-v1
          restore-keys: |
            ohlcv-${{ runner.os }}-${{ steps.route.outputs.campaign }}-
            ohlcv-${{ runner.os }}-

      - name: Fetch OHLCV data for each entry in SYMBOLS
        run: |
          # Each entry is "{asset}/{NAME}_{tf}" â€” e.g. crypto/BTC_USDT_4h, stocks/TSLA_1d.
          echo "$SYMBOLS" | tr ',' '\n' | while read -r entry; do
            entry=$(echo "$entry" | xargs)
            [ -z "$entry" ] && continue
            parquet="data/${entry}.parquet"
            if [ -f "$parquet" ]; then
              echo "have $parquet, skipping"
              continue
            fi
            asset="${entry%%/*}"
            rest="${entry#*/}"
            tf="${rest##*_}"
            name="${rest%_*}"
            if [ "$asset" = "crypto" ]; then
              name="${name//_//}"
              start="2019-01-01"
            else
              start="2015-01-01"
            fi
            mkdir -p "data/${asset}"
            echo "fetch: asset=$asset symbol=$name tf=$tf start=$start"
            python data_fetch.py --asset "$asset" --symbol "$name" --timeframe "$tf" --start "$start"
          done

      - name: Configure git for commits the loop makes
        run: |
          git config user.name 'autoresearch-bot'
          git config user.email 'autoresearch-bot@users.noreply.github.com'

      - name: Sanity check secret
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error ::OPENROUTER_API_KEY secret is not set on this repo"
            exit 1
          fi

      - name: Run autoresearch loop
        run: python loop.py --iters "$ITERS"

      - name: Push back to campaign branch
        env:
          BRANCH: ${{ steps.route.outputs.branch }}
        run: |
          # Single-writer branch â€” no rebase needed. If push fails it means
          # someone pushed to this branch manually; surface that as an error
          # rather than silently rebasing over their work.
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/$BRANCH")" ]; then
            echo "No new commits from loop; nothing to push"
            exit 0
          fi
          git push origin "HEAD:$BRANCH"

      - name: Upload run.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ steps.route.outputs.campaign }}-${{ github.run_id }}
          path: |
            results/run.log
            results/*.tsv
          retention-days: 30
