name: Autoresearch loop

# Runs the loop on a schedule and commits any kept mutations + updated
# results.tsv back to main. Manual trigger via workflow_dispatch is also
# supported for ad-hoc runs.
#
# Schedule: daily at 10:00 UTC = 02:00 PST. Off-hours so it doesn't compete
# with the morning signal scan workflow. Adjust the cron string below to
# change cadence — every 6h is `0 */6 * * *`, every 4h is `0 */4 * * *`.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY  — used by loop.py to call Claude

on:
  schedule:
    - cron: '0 10 * * *'  # daily 10:00 UTC
  workflow_dispatch:
    inputs:
      iters:
        description: 'Number of mutations to attempt'
        required: false
        default: '15'
        type: string
      optimize_metric:
        description: 'val_sharpe | calmar | dsr'
        required: false
        default: 'val_sharpe'
        type: choice
        options:
          - val_sharpe
          - calmar
          - dsr
      symbols:
        description: 'Comma-sep parquet stems under data/ (e.g. crypto/BTC_USDT_4h or stocks/TSLA_1d,stocks/NVDA_1d). Empty = default stocks/TSLA_1d,stocks/NVDA_1d,stocks/PYPL_1d.'
        required: false
        default: ''
        type: string

permissions:
  contents: write   # needed to push the commits the loop produces

concurrency:
  # Only one loop run at a time across both schedule and dispatch — protects
  # the repo from racing pushes / divergent histories.
  group: autoresearch-loop
  cancel-in-progress: false

jobs:
  run-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ITERS: ${{ github.event.inputs.iters || '15' }}
      OPTIMIZE_METRIC: ${{ github.event.inputs.optimize_metric || 'val_sharpe' }}
      SYMBOLS: ${{ github.event.inputs.symbols || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
      - name: Checkout (full history so loop can reset cleanly)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install backtesting ccxt yfinance anthropic pyarrow scipy python-dotenv

      - name: Cache OHLCV parquet data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data/
          key: ohlcv-${{ runner.os }}-v1
          restore-keys: ohlcv-${{ runner.os }}-

      - name: Fetch OHLCV data for each entry in SYMBOLS
        env:
          EFFECTIVE_SYMBOLS: ${{ env.SYMBOLS != '' && env.SYMBOLS || 'stocks/TSLA_1d,stocks/NVDA_1d,stocks/PYPL_1d' }}
        run: |
          # Each entry is "{asset}/{NAME}_{tf}" — e.g. crypto/BTC_USDT_4h, stocks/TSLA_1d.
          # Resolve to data_fetch.py args; for crypto, restore "/" inside the pair name.
          echo "$EFFECTIVE_SYMBOLS" | tr ',' '\n' | while read -r entry; do
            entry=$(echo "$entry" | xargs)
            [ -z "$entry" ] && continue
            parquet="data/${entry}.parquet"
            if [ -f "$parquet" ]; then
              echo "have $parquet, skipping"
              continue
            fi
            asset="${entry%%/*}"
            rest="${entry#*/}"
            tf="${rest##*_}"
            name="${rest%_*}"
            if [ "$asset" = "crypto" ]; then
              name="${name//_//}"
              start="2019-01-01"
            else
              start="2015-01-01"
            fi
            mkdir -p "data/${asset}"
            echo "fetch: asset=$asset symbol=$name tf=$tf start=$start"
            python data_fetch.py --asset "$asset" --symbol "$name" --timeframe "$tf" --start "$start"
          done

      - name: Configure git for commits the loop makes
        run: |
          git config user.name 'autoresearch-bot'
          git config user.email 'autoresearch-bot@users.noreply.github.com'

      - name: Sanity check secrets
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error ::ANTHROPIC_API_KEY secret is not set on this repo"
            exit 1
          fi

      - name: Run autoresearch loop
        run: python loop.py --iters "$ITERS"

      - name: Push kept mutations + results back to main
        run: |
          # results files are now per-campaign (results/<symbols>_<window>.tsv),
          # so commit any changes under results/*.tsv as a single bookkeeping entry.
          if ! git diff --quiet -- 'results/*.tsv'; then
            git add 'results/*.tsv'
            git commit -m "chore(loop): update results after CI run"
          fi
          # Only push if HEAD advanced beyond origin/main (kept mutations or the
          # bookkeeping commit above).
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/${GITHUB_REF_NAME})" ]; then
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Pushed loop output to ${GITHUB_REF_NAME}"
          else
            echo "No new commits from loop; nothing to push"
          fi

      - name: Upload run.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_id }}
          path: |
            results/run.log
            results/*.tsv
          retention-days: 30
