name: Autoresearch loop

# Runs the loop on a schedule and commits any kept mutations + updated
# results.tsv back to main. Manual trigger via workflow_dispatch is also
# supported for ad-hoc runs.
#
# Schedule: weekly on Sunday at 10:00 UTC = 02:00 PST (Saturday night for
# the user in California). Off-hours so it doesn't compete with the daily
# signal scan workflow. Adjust the cron string below to change cadence.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY  — used by loop.py to call Claude

on:
  schedule:
    - cron: '0 10 * * 0'  # Sunday 10:00 UTC
  workflow_dispatch:
    inputs:
      iters:
        description: 'Number of mutations to attempt'
        required: false
        default: '15'
        type: string
      optimize_metric:
        description: 'val_sharpe | calmar | dsr'
        required: false
        default: 'val_sharpe'
        type: choice
        options:
          - val_sharpe
          - calmar
          - dsr
      basket_symbols:
        description: 'Optional comma-separated stock basket (e.g. TSLA,NVDA,AAPL). Empty = use the default crypto BTC parquet.'
        required: false
        default: ''
        type: string

permissions:
  contents: write   # needed to push the commits the loop produces

concurrency:
  # Only one loop run at a time across both schedule and dispatch — protects
  # the repo from racing pushes / divergent histories.
  group: autoresearch-loop
  cancel-in-progress: false

jobs:
  run-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ITERS: ${{ github.event.inputs.iters || '15' }}
      OPTIMIZE_METRIC: ${{ github.event.inputs.optimize_metric || 'val_sharpe' }}
      BASKET_SYMBOLS: ${{ github.event.inputs.basket_symbols || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
      - name: Checkout (full history so loop can reset cleanly)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install backtesting ccxt yfinance anthropic pyarrow scipy python-dotenv

      - name: Cache OHLCV parquet data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data/
          key: ohlcv-${{ runner.os }}-v1
          restore-keys: ohlcv-${{ runner.os }}-

      - name: Fetch BTC data (only if cache miss / single-symbol mode)
        if: env.BASKET_SYMBOLS == ''
        run: |
          mkdir -p data/crypto
          if [ ! -f data/crypto/BTC_USDT_4h.parquet ]; then
            python data_fetch.py --asset crypto --symbol BTC/USDT --timeframe 4h --start 2019-01-01
          fi

      - name: Fetch stock basket data (only when basket mode)
        if: env.BASKET_SYMBOLS != ''
        run: |
          mkdir -p data/stocks
          IFS=',' read -ra SYMS <<< "$BASKET_SYMBOLS"
          for sym in "${SYMS[@]}"; do
            sym=$(echo "$sym" | xargs)
            if [ -n "$sym" ] && [ ! -f "data/stocks/${sym}_1d.parquet" ]; then
              python data_fetch.py --asset stocks --symbol "$sym" --timeframe 1d --start 2015-01-01
            fi
          done

      - name: Configure git for commits the loop makes
        run: |
          git config user.name 'autoresearch-bot'
          git config user.email 'autoresearch-bot@users.noreply.github.com'

      - name: Sanity check secrets
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error ::ANTHROPIC_API_KEY secret is not set on this repo"
            exit 1
          fi

      - name: Run autoresearch loop
        run: python loop.py --iters "$ITERS"

      - name: Push kept mutations + results back to main
        run: |
          # Only push if HEAD has advanced beyond origin/main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/${GITHUB_REF_NAME})" ]; then
            # results.tsv may also have new uncommitted rows from discards/crashes;
            # commit them as a single "loop bookkeeping" entry so we don't lose history.
            if ! git diff --quiet -- results/results.tsv; then
              git add results/results.tsv
              git commit -m "chore(loop): update results.tsv after CI run"
            fi
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Pushed loop output to ${GITHUB_REF_NAME}"
          else
            echo "No new commits from loop; nothing to push"
          fi

      - name: Upload run.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_id }}
          path: |
            results/run.log
            results/results.tsv
          retention-days: 30
